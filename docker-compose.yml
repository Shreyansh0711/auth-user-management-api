version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: chai_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - chai-network

  backend:
    build: ./backend
    container_name: chai_backend
    ports:
      - "8000:8000"
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/chai-and-backend?authSource=admin
      CORS_ORIGIN: http://localhost:3000
      JWT_SECRET: your_jwt_secret_key
      JWT_EXPIRY: 7d
      REFRESH_TOKEN_SECRET: your_refresh_token_secret
      REFRESH_TOKEN_EXPIRY: 10d
      CLOUDINARY_NAME: ${CLOUDINARY_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      PORT: 8000
    depends_on:
      - mongodb
    networks:
      - chai-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: chai_frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    networks:
      - chai-network
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongodb_data:

networks:
  chai-network:
    driver: bridge
